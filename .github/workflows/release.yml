name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(grep '"version"' manifest.json | head -1 | sed 's/.*"version"\s*:\s*"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # --- Chrome package (uses manifest.json with service_worker) ---
      - name: Create Chrome ZIP package
        run: |
          zip -r "d-op-v${{ steps.version.outputs.version }}-chrome.zip" \
            manifest.json \
            background.js \
            browser-polyfill.js \
            common.js \
            content.js \
            content-store.js \
            injected.js \
            popup.html \
            popup.css \
            popup.js \
            options.html \
            options.css \
            options.js \
            styles.css \
            styles-store.css \
            icons/ \
            PRIVACY.md \
            README.md

      # --- Firefox package (uses manifest.firefox.json → manifest.json) ---
      - name: Create Firefox XPI package
        run: |
          mkdir -p firefox-build/icons
          cp manifest.firefox.json firefox-build/manifest.json
          cp background.js browser-polyfill.js common.js content.js content-store.js injected.js firefox-build/
          cp popup.html popup.css popup.js options.html options.css options.js firefox-build/
          cp styles.css styles-store.css firefox-build/
          cp PRIVACY.md README.md firefox-build/
          cp -r icons/* firefox-build/icons/
          cd firefox-build
          zip -r "../d-op-v${{ steps.version.outputs.version }}-firefox.zip" .
          zip -r "../d-op-v${{ steps.version.outputs.version }}-firefox.xpi" .
          cd ..
          rm -rf firefox-build

      - name: Create CRX package (if key available)
        if: env.CRX_PRIVATE_KEY != ''
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          echo "$CRX_PRIVATE_KEY" > key.pem
          npx crx3 pack \
            --keyPath key.pem \
            --zipPath "d-op-v${{ steps.version.outputs.version }}-chrome.zip" \
            -o "d-op-v${{ steps.version.outputs.version }}-chrome.crx"
          rm key.pem

      - name: Delete existing tag/release if exists
        continue-on-error: true
        run: |
          git push origin :refs/tags/v${{ steps.version.outputs.version }} 2>/dev/null || true
          gh release delete "v${{ steps.version.outputs.version }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          body: |
            ## Summary
            <!-- 1-3行で今回の目的を書く -->

            ## Changes
            - 

            ## Verification
            - [ ] 動作確認済み

            ## Notes
            - `d-op-v*-chrome.zip` — Chrome 手動インストール / CWS アップロード用
            - `d-op-v*-chrome.crx` — Chrome CRX パッケージ（署名キーがある場合のみ）
            - `d-op-v*-firefox.zip` — Firefox 手動インストール / ソース確認用
            - `d-op-v*-firefox.xpi` — Firefox AMO アップロード用
          files: |
            d-op-v${{ steps.version.outputs.version }}-chrome.zip
            d-op-v${{ steps.version.outputs.version }}-chrome.crx
            d-op-v${{ steps.version.outputs.version }}-firefox.zip
            d-op-v${{ steps.version.outputs.version }}-firefox.xpi
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ github.token }}
